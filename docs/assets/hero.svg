<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="A2W — agent-native, deterministic, zero-token workflow engine">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070810"/>
      <stop offset="1" stop-color="#0d1020"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5ac8fa"/>
      <stop offset="0.5" stop-color="#7d7bff"/>
      <stop offset="1" stop-color="#bf5af2"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif;font-weight:700}
      .label{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Helvetica,Arial,sans-serif;font-weight:600}
      .chip{fill:#11142200;stroke:#2a3150;stroke-width:1.5}
      .chip-fill{fill:#0e1120}
      .glow{animation:pulse 3s ease-in-out infinite}
      .glow2{animation:pulse 3s ease-in-out infinite;animation-delay:1s}
      .glow3{animation:pulse 3s ease-in-out infinite;animation-delay:2s}
      @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
      .blobA{animation:driftA 14s ease-in-out infinite}
      .blobB{animation:driftB 18s ease-in-out infinite}
      @keyframes driftA{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-20px)}}
      @keyframes driftB{0%,100%{transform:translate(0,0)}50%{transform:translate(-36px,24px)}}
    </style>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>
  <g opacity="0.5" filter="url(#soft)">
    <circle class="blobA" cx="260" cy="90"  r="150" fill="#5ac8fa" opacity="0.18"/>
    <circle class="blobB" cx="1040" cy="250" r="170" fill="#bf5af2" opacity="0.16"/>
    <circle class="blobA" cx="700" cy="60"  r="130" fill="#7d7bff" opacity="0.14"/>
  </g>

  <!-- wordmark -->
  <text x="640" y="92" text-anchor="middle" class="title" font-size="58" fill="url(#brand)">A2W</text>
  <text x="640" y="128" text-anchor="middle" class="label" font-size="18" fill="#aab2c5">the agent-native workflow engine that proves its own work</text>

  <!-- pipeline -->
  <line x1="150" y1="232" x2="1130" y2="232" stroke="#222a45" stroke-width="2"/>
  <path id="rail" d="M150 232 H1130" fill="none"/>

  <!-- nodes -->
  <g class="label" font-size="14.5" fill="#e7eaf2" text-anchor="middle">
    <g><rect class="chip-fill" x="92"  y="212" width="116" height="40" rx="11"/><rect class="chip glow"  x="92"  y="212" width="116" height="40" rx="11" stroke="#5ac8fa"/><text x="150"  y="237">Author</text></g>
    <g><rect class="chip-fill" x="288" y="212" width="116" height="40" rx="11"/><rect class="chip glow2" x="288" y="212" width="116" height="40" rx="11" stroke="#6fb6ff"/><text x="346"  y="237">Validate</text></g>
    <g><rect class="chip-fill" x="484" y="212" width="116" height="40" rx="11"/><rect class="chip glow3" x="484" y="212" width="116" height="40" rx="11" stroke="#7d7bff"/><text x="542"  y="237">Run</text></g>
    <g><rect class="chip-fill" x="680" y="212" width="116" height="40" rx="11"/><rect class="chip glow"  x="680" y="212" width="116" height="40" rx="11" stroke="#9d7bff"/><text x="738"  y="237">Verify</text></g>
    <g><rect class="chip-fill" x="876" y="212" width="116" height="40" rx="11"/><rect class="chip glow2" x="876" y="212" width="116" height="40" rx="11" stroke="#bf5af2"/><text x="934"  y="237">Promote</text></g>
    <g><rect class="chip-fill" x="1072" y="212" width="116" height="40" rx="11"/><rect class="chip glow3" x="1072" y="212" width="116" height="40" rx="11" stroke="#bf5af2"/><text x="1130" y="237">Evolve</text></g>
  </g>

  <!-- flowing tokens -->
  <g>
    <circle r="5" fill="#5ac8fa"><animateMotion dur="3.2s" repeatCount="indefinite" begin="0s"><mpath href="#rail" xlink:href="#rail"/></animateMotion></circle>
    <circle r="5" fill="#7d7bff"><animateMotion dur="3.2s" repeatCount="indefinite" begin="1.05s"><mpath href="#rail" xlink:href="#rail"/></animateMotion></circle>
    <circle r="5" fill="#bf5af2"><animateMotion dur="3.2s" repeatCount="indefinite" begin="2.1s"><mpath href="#rail" xlink:href="#rail"/></animateMotion></circle>
    <circle r="3.5" fill="#30d158"><animateMotion dur="3.2s" repeatCount="indefinite" begin="2.6s"><mpath href="#rail" xlink:href="#rail"/></animateMotion></circle>
  </g>

  <!-- footnote pills -->
  <g class="label" font-size="13" fill="#8b93a7" text-anchor="middle">
    <text x="640" y="300">deterministic · zero-token execution  ·  outcome verification  ·  holdout-certified self-improvement</text>
  </g>
</svg>

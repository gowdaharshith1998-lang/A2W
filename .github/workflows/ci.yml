name: CI

on:
  push:
    branches: [main, production-hardening]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: never
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy --workspace --all-targets -- -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  audit:
    name: cargo-audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # No version pin: 0.21.2 can't parse CVSS 4.0 advisories
      # (e.g. RUSTSEC-2026-0124). Track latest stable cargo-audit.
      - run: cargo install --locked cargo-audit
      - run: cargo audit --deny warnings

  deny:
    name: cargo-deny (licenses, advisories, bans)
    runs-on: ubuntu-latest
    continue-on-error: true # initial run informational; flip to required after policy is settled.
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2

  docker:
    name: docker build (a2w-server image)
    runs-on: ubuntu-latest
    needs: [clippy, test]
    steps:
      - uses: actions/checkout@v5
      - name: docker build
        run: docker build -t a2w-server:ci .
      - name: smoke
        # Boot the image, wait for /ready, then kill it.
        run: |
          docker run -d --name a2w -p 18080:8080 a2w-server:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/ready; then
              echo "ready"
              break
            fi
            sleep 1
          done
          docker logs a2w | tail -30
          docker stop a2w
